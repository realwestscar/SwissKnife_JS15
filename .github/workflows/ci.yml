name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  required-ci:
    name: required-ci
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: swissknife
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d swissknife"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      NODE_ENV: test
      JWT_SECRET: ci-jwt-secret-123456789012345678901234
      REFRESH_TOKEN_PEPPER: ci-refresh-pepper-123456
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/swissknife
      ALLOW_IN_MEMORY_DB: 'false'
      ALLOW_IN_MEMORY_RATE_LIMIT: 'true'
      UPSTASH_REDIS_REST_URL: ''
      UPSTASH_REDIS_REST_TOKEN: ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm test:unit
      - run: corepack pnpm db:migrate
      - run: corepack pnpm test:integration
